<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyping — Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
      --green: #22c55e; --text: #f0f0f0; --muted: #888;
      --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    h1 { font-family: var(--sans); font-size: 2rem; font-weight: 800; margin-bottom: .5rem; text-align: center; }
    h1 span { color: var(--green); }
    .sub { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 2.5rem; }
    .code-inputs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .code-inputs input {
      width: 52px; height: 64px; text-align: center;
      font-family: var(--mono); font-size: 24px; font-weight: 700;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .code-inputs input:focus { border-color: var(--green); }
    .sep { display: flex; align-items: center; color: var(--muted); font-size: 20px; }
    .connect-btn {
      background: var(--green); color: #000;
      font-family: var(--sans); font-weight: 800; font-size: 15px;
      border: none; border-radius: 8px; padding: 12px 40px;
      cursor: pointer; transition: opacity .15s; width: 100%; max-width: 340px;
    }
    .connect-btn:hover { opacity: .85; }
    .connect-btn:disabled { opacity: .4; cursor: not-allowed; }
    .error { color: #f87171; font-size: 12px; margin-top: 1rem; min-height: 18px; }
    .back { margin-top: 2rem; font-size: 12px; color: var(--muted); }
    .back a { color: var(--muted); text-decoration: underline; }
    #terminal-wrap { display: none; width: 100%; max-width: 900px; margin-top: 2rem; }
    #terminal-wrap h2 { font-family: var(--sans); font-size: 14px; color: var(--muted); margin-bottom: .75rem; }
    #terminal { background: #000; border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: .5rem; }
  </style>
</head>
<body>

  <h1>Enter your <span>code</span></h1>
  <p class="sub">6-digit code from the agent running on the remote machine</p>

  <div class="code-inputs">
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    <span class="sep">—</span>
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    <input class="digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
  </div>

  <button class="connect-btn" id="connectBtn" disabled>Connect →</button>
  <div class="error" id="error"></div>
  <div class="back"><a href="index.html">← back to home</a></div>

  <div id="terminal-wrap">
    <h2>terminal session</h2>
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const digits = document.querySelectorAll('.digit');
    const btn = document.getElementById('connectBtn');
    const errorEl = document.getElementById('error');

    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
        checkReady();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
      });
    });
    digits[0].focus();

    function checkReady() {
      btn.disabled = getCode().length !== 6;
    }

    function getCode() {
      return [...digits].map(d => d.value).join('');
    }

    btn.addEventListener('click', () => {
      const code = getCode();
      errorEl.textContent = '';
      startSession(code);
    });

    function startSession(code) {
      btn.disabled = true;
      btn.textContent = 'Connecting...';

      const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'JetBrains Mono, monospace',
        theme: { background: '#000000' }
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);

      document.getElementById('terminal-wrap').style.display = 'block';
      term.open(document.getElementById('terminal'));
      fitAddon.fit();

      const ws = new WebSocket(`wss://skyping-production.up.railway.app/client/${code}`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        btn.textContent = 'Connected';
        term.write('\r\nConnected! Type away...\r\n\r\n');
      };

      ws.onmessage = (e) => {
        if (e.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(e.data));
        } else {
          term.write(e.data);
        }
      };

      ws.onerror = () => {
        errorEl.textContent = 'Connection failed. Make sure the agent is running.';
        btn.disabled = false;
        btn.textContent = 'Connect →';
      };

      ws.onclose = () => {
        term.write('\r\n\r\nSession closed.');
      };

      term.onData(data => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });

      window.addEventListener('resize', () => fitAddon.fit());
    }
  </script>
</body>
</html>
